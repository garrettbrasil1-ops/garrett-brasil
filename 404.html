<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — Garrett Brasil</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #c8a84b;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .error-message {
      color: #666;
      margin-bottom: 2rem;
      max-width: 480px;
    }
    .btn-home {
      display: inline-block;
      background: #c8a84b;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-home:hover { background: #a8882b; }
  </style>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="shortcut icon" href="favicon.ico">

      <a href="index.html" class="logo">
        <img src="img/garrett-logo.svg" alt="Garrett Brasil" />
      </a>
    </div>
  </header>

  <main>
    <div class="error-page">
      <div class="error-code">404</div>
      <h1 class="error-title">Página não encontrada</h1>
      <p class="error-message">
        A página que você procura não existe ou foi movida.<br />
        Verifique o endereço ou volte ao início.
      </p>
      <a href="index.html" class="btn-home">← Voltar ao início</a>
    </div>

  <footer class="site-footer">
